<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR マーカー体験</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; font-family:'Helvetica Neue',sans-serif; background:#000; }
#loading {
  position:fixed; inset:0;
  background:#0a0a0a;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:100; color:#fff; gap:16px;
}
#loading p { font-size:0.8rem; color:#888; letter-spacing:0.1em; text-align:center; padding:0 20px; }
.spinner {
  width:40px; height:40px;
  border:2px solid #333;
  border-top-color:#fff;
  border-radius:50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
#ui {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  padding:10px 20px;
  color:rgba(255,255,255,0.7);
  font-size:0.75rem;
  letter-spacing:0.1em;
  z-index:10;
  pointer-events:none;
  text-align:center;
  white-space:nowrap;
}
#found-msg {
  position:fixed; top:20px; left:50%;
  transform:translateX(-50%);
  background:rgba(80,180,80,0.9);
  border-radius:8px;
  padding:8px 20px;
  color:#fff;
  font-size:0.8rem;
  z-index:10;
  opacity:0;
  transition:opacity 0.3s;
}
</style>
</head>
