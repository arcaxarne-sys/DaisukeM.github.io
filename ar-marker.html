<head>
<meta charset="UTF-8">

<title>AR マーカー体験</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; font-family:'Helvetica Neue',sans-serif; background:#000; }

#loading {
  position:fixed; inset:0;
  background:#0a0a0a;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:100; color:#fff; gap:16px;
}
#loading p { font-size:0.8rem; color:#888; letter-spacing:0.1em; }
.spinner {
  width:40px; height:40px;
  border:2px solid #333;
  border-top-color:#fff;
  border-radius:50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

#ui {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  padding:10px 20px;
  color:rgba(255,255,255,0.6);
  font-size:0.75rem;
  letter-spacing:0.1em;
  z-index:10;
  pointer-events:none;
  text-align:center;
}
#found-msg {
  position:fixed; top:20px; left:50%;
  transform:translateX(-50%);
  background:rgba(100,200,100,0.85);
  border-radius:8px;
  padding:8px 20px;
  color:#fff;
  font-size:0.8rem;
  letter-spacing:0.1em;
  z-index:10;
  opacity:0;
  transition:opacity 0.3s;
}
</style>
</head>

// =============================================
//  MindAR セットアップ
// =============================================
async function main() {
  // Base64画像からマーカーをコンパイル
  const compiler = new MINDAR.IMAGE.Compiler();
  
  document.querySelector('#loading p').textContent = 'マーカーを学習中...';

  // 画像をImageオブジェクトに変換
  const img = new Image();
  img.src = MARKER_B64;
  await new Promise(r => img.onload = r);

  // canvas経由でピクセルデータを取得
  const canvas = document.createElement('canvas');
  canvas.width = img.width;
  canvas.height = img.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const imageData = ctx.getImageData(0, 0, img.width, img.height);

  // コンパイル
  const dataList = await compiler.compileImageTargets([imageData], (progress) => {
    document.querySelector('#loading p').textContent = 
      'マーカー学習中... ' + Math.round(progress) + '%';
  });

  const exportedBuffer = await compiler.exportData();

  document.querySelector('#loading p').textContent = 'AR起動中...';

  // MindAR + Three.js 初期化
  const mindarThree = new MINDAR.IMAGE.MindARThree({
    container: document.body,
    imageTargetSrc: new Blob([exportedBuffer], {type: 'application/octet-stream'}),
    maxTrack: 1,
  });

  const { renderer, scene, camera } = mindarThree;

  // ---- 照明 ----
  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(1, 2, 3);
  scene.add(dirLight);

  // ---- マーカー上に表示するオブジェクト ----
  const anchor = mindarThree.addAnchor(0);

  // ブロックのグループ
  const group = new THREE.Group();

  // 床面（マーカーに合わせた平面）
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(1.2, 0.8),
    new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.8 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = 0;
  group.add(floor);

  // マイクラ風ブロックを並べる
  const blockColors = [0x8B4513, 0x228B22, 0x808080, 0xFFD700];
  const blockMat = (color) => new THREE.MeshStandardMaterial({ color, roughness: 0.7 });

  function addBlock(x, y, z, color) {
    const mesh = new THREE.Mesh(
      new THREE.BoxGeometry(0.12, 0.12, 0.12),
      blockMat(color)
    );
    mesh.position.set(x, y + 0.06, z);
    group.add(mesh);
  }

  // 小さな建物を組む
  // 1階
  for (let xi = -1; xi <= 1; xi++) {
    for (let zi = -1; zi <= 1; zi++) {
      addBlock(xi * 0.13, 0, zi * 0.13, 0x808080);
    }
  }
  // 2階（外壁のみ）
  for (let xi = -1; xi <= 1; xi++) {
    addBlock(xi * 0.13, 0.13, -0.13, 0x808080);
    addBlock(xi * 0.13, 0.13,  0.13, 0x808080);
  }
  addBlock(-0.13, 0.13, 0, 0x808080);
  addBlock( 0.13, 0.13, 0, 0x808080);

  // 屋根（緑ブロック）
  for (let xi = -1; xi <= 1; xi++) {
    for (let zi = -1; zi <= 1; zi++) {
      addBlock(xi * 0.13, 0.26, zi * 0.13, 0x228B22);
    }
  }

  // 隣に木を1本
  addBlock(0.35, 0,    0, 0x8B4513);
  addBlock(0.35, 0.13, 0, 0x8B4513);
  addBlock(0.35, 0.26, 0, 0x228B22);
  addBlock(0.22, 0.26, 0, 0x228B22);
  addBlock(0.35, 0.26, 0.13, 0x228B22);
  addBlock(0.35, 0.26,-0.13, 0x228B22);

  // アニメーション用：ゆっくり浮かせる
  group.position.y = 0.05;
  anchor.group.add(group);

  // ---- イベント ----
  anchor.onTargetFound = () => {
    const msg = document.getElementById('found-msg');
    msg.style.opacity = '1';
    setTimeout(() => msg.style.opacity = '0', 2000);
  };

  // ---- ループ ----
  let t = 0;
  renderer.setAnimationLoop(() => {
    t += 0.02;
    group.position.y = 0.05 + Math.sin(t) * 0.005;
    group.rotation.y = t * 0.3;
    renderer.render(scene, camera);
  });

  // ---- 起動 ----
  await mindarThree.start();
  document.getElementById('loading').style.display = 'none';
}

main().catch(err => {
  console.error(err);
  document.querySelector('#loading p').textContent = 
    'エラー: ' + err.message + '\nHTTPS環境が必要です';
});
</script>
